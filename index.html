              ['5','Paste the Client ID below and tap Connect.']
            ].map(([n,t])=><div key={n} style={{display:'flex',gap:10,fontSize:20,lineHeight:1.55,marginBottom:10}}>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:27,color:'#c9a050',flexShrink:0}}>{n}</span>
              <span style={{color:'#f0e4cc'}}>{t}</span>
            </div>)}
          {!driveClientId&&<div style={{fontSize:18,fontFamily:'sans-serif',color:'#7a6555',marginBottom:12,lineHeight:1.5}}>
            {location.protocol==='file:'
              ? <span style={{color:'#ff9a9a'}}>⚠ This page is open as a local file (file://). Google sign-in cannot run here — host it on GitHub Pages or a local server first.</span>
              : <>This page&rsquo;s origin (paste into Authorised JavaScript origins): <code style={{fontFamily:'monospace',fontSize:18,background:'rgba(255,255,255,.07)',padding:'1px 6px',borderRadius:3,color:'#f0e4cc'}}>{location.origin}</code></>}
          </div>}
          {driveErr&&<p style={{color:'#ff9a9a',fontSize:18,fontFamily:'sans-serif',lineHeight:1.5,marginBottom:10}}>{driveErr}</p>}
          <div className="fgrp"><label className="lbl">Google OAuth Client ID</label>
            <div style={{display:'flex',gap:8}}>
              <input value={driveClientId} onChange={e=>{tokenClientRef.current=null;setDriveClientId(e.target.value);}} placeholder="xxxx.apps.googleusercontent.com" style={{flex:1}}/>
              <button className="btn btn-grn" style={{flexShrink:0}} onClick={initDrive}>{driveStatus==='connecting'?'…':'Connect'}</button>
            </div>
          </div>
        </>}
      </div>
      <div style={{textAlign:'center',color:'#5a4a3f',fontSize:15,fontFamily:'sans-serif',letterSpacing:'.08em',marginTop:26}}>Vinothèque · {APP_BUILD}</div>
      <div style={{height:20}}/>
    </div>}

    {view==='guide'&&<TastingGuide/>}

    {/* BOTTOM NAV */}
    <div className="bnav">
      {[{v:'collection',l:'Cellar'},{v:'import',l:'Import'},{v:'tidy',l:'Tidy'},{v:'guide',l:'Guide'},{v:'backup',l:'Backup'}].map(({v,l})=>(
        <button key={v} className={'bni'+(view===v?' active':'')} onClick={()=>setView(v)}>
          <svg viewBox="0 0 24 24">
            {v==='collection'&&<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>}
            {v==='import'&&<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}
            {v==='tidy'&&<><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4.5" cy="6" r="1.2"/><circle cx="4.5" cy="12" r="1.2"/><circle cx="4.5" cy="18" r="1.2"/></>}
            {v==='backup'&&<><polyline points="20 7 12 3 4 7"/><path d="M4 7v10l8 4 8-4V7"/></>}
            {v==='guide'&&<><path d="M7 3h10l-1.3 6a4 4 0 01-7.4 0z"/><line x1="12" y1="13" x2="12" y2="20"/><line x1="8.5" y1="20" x2="15.5" y2="20"/></>}
          </svg>
          {l}
        </button>
      ))}
    </div>

    {/* FAB - Add Wine */}
    <button onClick={()=>setAddingNew(true)} style={{position:'fixed',bottom:'calc(72px + var(--safe-bottom))',right:18,zIndex:60,width:52,height:52,borderRadius:'50%',background:'#5c1527',border:'2px solid #7a1e33',color:'#f0e4cc',fontSize:39,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 20px rgba(122,30,51,.6)',lineHeight:1}}>+</button>

    {/* MODALS */}
    {addingNew&&<TastingForm allWines={wines} onSave={addWine} onCancel={()=>setAddingNew(false)}/>}
    {view==='tidy'&&<ListManager wines={wines} setWines={setWines} fld={tidyFld} setFld={setTidyFld} scrollRef={tidyScrollRef} onSearch={tidySearch}/>}
    {detail&&!editing&&<DetailModal w={detail} onClose={()=>setDetail(null)} onEdit={()=>setEditing(detail)} onDelete={()=>deleteWine(detail.id)}/>}
    {editing&&<TastingForm initial={{...editing,tastedAt:editing.tastedAt?new Date(editing.tastedAt).toISOString().slice(0,16):''}} title={<>Edit <em>Wine</em></>} allWines={wines} onSave={saveEdit} onCancel={()=>setEditing(null)}/>}

    {/* TOAST */}
    {toast&&<div className="toast">{toast}</div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script></body></html>

      // At root — show exit dialog
      // setTimeout so the pushState above settles before the dialog blocks the thread
      setTimeout(()=>{
        const choice = window.confirm(
          'Leave Vinoth\u00e8que?\n\n' +
          'Your data is saved in this browser.\n' +
          'To keep a portable copy, go to Backup and download a JSON file.'
        );
        if(choice){
          // User wants to leave — remove our handler and go back twice:
          // once for the sentinel we just pushed, once for the real previous page
          window.removeEventListener('popstate', handlePop);
          window.history.go(-2);
        }
        // If they chose to stay, we already pushed so we're safely intercepted again
      }, 0);
    }

    window.addEventListener('popstate', handlePop);
    return () => window.removeEventListener('popstate', handlePop);
  }, []); // Register ONCE only — stateRef handles current values

  // ── DERIVED ──
  const countries=[...new Set(wines.map(w=>w.country).filter(Boolean))].sort();
  const grapes=[...new Set(wines.map(w=>w.grape).filter(Boolean))].sort();
  const retailers=[...new Set(wines.map(w=>w.retailer).filter(Boolean))].sort();

  function matchSearch(w,q,inField){
    if(!q)return true;
    const ql=q.toLowerCase();
    const fields={
      all:[w.wineName,w.producer,w.grape,w.region,w.country,w.retailer,w.location,
           w.colour?.d,w.nose?.d,w.body?.d,w.finish?.d,w.comment,w.extraNote],
      name:[w.wineName,w.producer,w.grape],
      colour:[w.colour?.d],nose:[w.nose?.d],body:[w.body?.d],finish:[w.finish?.d],
      notes:[w.comment,w.extraNote],location:[w.location],
    };
    return (fields[inField]||fields.all).filter(Boolean).some(s=>s.toLowerCase().includes(ql));
  }

  const filtered=wines.filter(w=>{
    if(typeFilter!=='all'&&w.type!==typeFilter)return false;
    if(fCountry&&w.country!==fCountry)return false;
    if(fGrape&&w.grape!==fGrape)return false;
    if(fRetail&&w.retailer!==fRetail)return false;
    if(fScore&&(w.score==null||w.score<parseFloat(fScore)))return false;
    if(search&&!matchSearch(w,search,searchIn))return false;
    return true;
  }).sort((a,b)=>{
    function cmp(s,a,b){
      if(s==='score-d')return(b.score||0)-(a.score||0);
      if(s==='score-a')return(a.score||0)-(b.score||0);
      if(s==='vin-d')return((typeof b.vintage==='number'?b.vintage:0)-(typeof a.vintage==='number'?a.vintage:0));
      if(s==='vin-a')return((typeof a.vintage==='number'?a.vintage:0)-(typeof b.vintage==='number'?b.vintage:0));
      if(s==='name-a')return(a.wineName||'').localeCompare(b.wineName||'');
      if(s==='name-z')return(b.wineName||'').localeCompare(a.wineName||'');
      if(s==='price-a')return(a.price||0)-(b.price||0);
      if(s==='price-d')return(b.price||0)-(a.price||0);
      if(s==='abv-d')return(b.abv||0)-(a.abv||0);
      if(s==='abv-a')return(a.abv||0)-(b.abv||0);
      if(s==='tasted-a')return new Date(a.tastedAt||a.added||0)-new Date(b.tastedAt||b.added||0);
      return new Date(b.tastedAt||b.added||0)-new Date(a.tastedAt||a.added||0);
    }
    return cmp(sortBy,a,b)||cmp(sortBy2,a,b);
  });

  const scored=wines.filter(w=>w.score!=null);
  const avg=scored.length?(scored.reduce((s,w)=>s+w.score,0)/scored.length).toFixed(1):'—';

  // ── WINE CRUD ──
  function resetFilters(){setSearch('');setSearchIn('all');setTypeFilter('all');setFCountry('');setFGrape('');setFRetail('');setFScore('');setSortBy('tasted-d');setSortBy2('name-a');}
  function tidySearch(field,value){
    tidyScrollRef.current=(document.scrollingElement||document.documentElement).scrollTop||document.body.scrollTop||0;
    setTypeFilter('all');setFCountry('');setFGrape('');setFRetail('');setFScore('');setSearch('');setSearchIn('all');
    if(field==='grape')setFGrape(value);
    else if(field==='country')setFCountry(value);
    else if(field==='retailer')setFRetail(value);
    else if(field==='location'){setSearch(value);setSearchIn('location');}
    else {setSearch(value);setSearchIn('all');}
    setView('collection');
  }
  function addWine(w){setWines(p=>[w,...p]);setAddingNew(false);setPrefill(null);showToast('Wine saved!');}
  function startTastingFrom(w){setPrefill(w);setAddingNew(true);}
  function saveEdit(w){setWines(p=>p.map(x=>x.id===w.id?w:x));setEditing(null);setDetail(w);showToast('Saved');}
  function deleteWine(id){if(!confirm('Delete this wine?'))return;setWines(p=>p.filter(x=>x.id!==id));setDetail(null);showToast('Deleted');}

  // ── IMPORT ──
  function doParse(){
    const p=importText.split(/={3,}/).map(s=>s.trim()).filter(s=>s.length>10).map(parseEntry).filter(Boolean);
    setPreview(p);setParsed(true);
  }
  function doImport(){
    const at=impDate?new Date(impDate).toISOString():new Date().toISOString();
    const toAdd=preview.filter(p=>!wines.some(e=>e.raw===p.raw));
    toAdd.forEach(w=>{w.tastedAt=w.tastedAt||at;if(impLoc)w.location=impLoc;});
    setWines(w=>[...toAdd,...w]);
    showToast('Imported '+toAdd.length+' wine'+(toAdd.length!==1?'s':''));
    setImportText('');setPreview([]);setParsed(false);setImpDate('');setImpLoc('');setView('collection');
  }

  // ── BACKUP ──
  function exportJSON(){
    const blob=new Blob([JSON.stringify({version:4,exported:new Date().toISOString(),wines},null,2)],{type:'application/json'});
    const a=document.createElement('a');a.href=URL.createObjectURL(blob);
    a.download='vinotheque-'+new Date().toISOString().slice(0,10)+'.json';a.click();URL.revokeObjectURL(a.href);
    showToast('Backup downloaded');
  }
  function importJSON(e){
    const file=e.target.files[0];if(!file)return;
    const r=new FileReader();
    r.onload=ev=>{try{const d=JSON.parse(ev.target.result);const inc=d.wines||d;
      if(!Array.isArray(inc)){showToast('Invalid file');return;}
      setWines(cur=>{const m=new Map(cur.map(w=>[w.id,w]));inc.forEach(w=>{if(w.id)m.set(w.id,w);});return Array.from(m.values());});
      showToast('Restored '+inc.filter(w=>w.id).length+' wines');
    }catch{showToast('Could not read file');}};
    r.readAsText(file);e.target.value='';
  }

  // ── GOOGLE DRIVE ──
  // The OAuth access token lasts ~1h and is NEVER persisted. On expiry we attempt
  // one silent refresh; if that fails we surface a clear Reconnect prompt.
  useEffect(()=>{winesRef.current=wines;},[wines]);
  function setToken(t){driveTokenRef.current=t;setDriveToken(t);}

  function getTokenClient(){
    if(tokenClientRef.current)return tokenClientRef.current;
    if(!window.google?.accounts?.oauth2)return null;
    const cid=(driveClientId||localStorage.getItem('vino_gci')||'').trim();
    if(!cid)return null;
    tokenClientRef.current=google.accounts.oauth2.initTokenClient({
      client_id:cid,
      scope:'https://www.googleapis.com/auth/drive.file',
      callback:(r)=>{
        if(pendingTokenResolveRef.current){const res=pendingTokenResolveRef.current;pendingTokenResolveRef.current=null;res(r);return;}
        if(r.error){handleAuthError(r.error);return;}
        setToken(r.access_token);setDriveStatus('ok');setDriveErr('');
        driveAutoSync(r.access_token);showToast('Connected to Drive ✓');
      },
    });
    return tokenClientRef.current;
  }

  function handleAuthError(code){
    let msg;
    if(code==='access_denied')msg='Access denied. On the OAuth consent screen, add your Google account under "Test users", then try again.';
    else if(code==='popup_closed'||code==='popup_failed_to_open')msg='Sign-in window closed before finishing — tap Connect again.';
    else if(/origin|idpiframe/i.test(code))msg='This page\u2019s URL is not an Authorised JavaScript origin. Add it exactly (scheme + host, no path) to your OAuth client.';
    else msg='Sign-in failed: '+code;
    setDriveStatus('err');setDriveErr(msg);showToast(msg);
  }

  function ensureGisLoaded(cb){
    if(window.google?.accounts?.oauth2){cb();return;}
    const ex=document.querySelector('script[data-gis]');
    if(ex){ex.addEventListener('load',cb);return;}
    const s=document.createElement('script');
    s.src='https://accounts.google.com/gsi/client';s.async=true;s.defer=true;s.dataset.gis='1';
    s.onload=cb;s.onerror=()=>{setDriveStatus('err');setDriveErr('Could not load Google Sign-In — check your connection or any ad-blocker.');showToast('Could not load Google Sign-In');};
    document.head.appendChild(s);
  }

  function initDrive(){
    const cid=driveClientId.trim();
    if(!cid){showToast('Enter your OAuth Client ID first');return;}
    if(!/\.apps\.googleusercontent\.com$/.test(cid)){showToast('That ID should end in .apps.googleusercontent.com');return;}
    if(location.protocol==='file:'){setDriveErr('Google sign-in cannot run from a file:// page. Host it on GitHub Pages (HTTPS) first.');showToast('Won\u2019t work from a file:// page — host on HTTPS first');return;}
    setDriveClientId(cid);localStorage.setItem('vino_gci',cid);
    setDriveStatus('connecting');setDriveErr('');
    ensureGisLoaded(()=>{
      const tc=getTokenClient();
      if(!tc){setDriveStatus('err');showToast('Google Sign-In failed to initialise');return;}
      try{tc.requestAccessToken({prompt:''});}
      catch(e){setDriveStatus('err');setDriveErr('OAuth error: '+e.message);showToast('OAuth error: '+e.message);}
    });
  }

  function refreshToken(){
    if(refreshingRef.current)return Promise.resolve(null);
    refreshingRef.current=true;
    return new Promise((resolve)=>{
      const done=(t)=>{refreshingRef.current=false;resolve(t);};
      ensureGisLoaded(()=>{
        const tc=getTokenClient();
        if(!tc){done(null);return;}
        let settled=false;
        const finish=(r)=>{if(settled)return;settled=true;if(r&&r.access_token&&!r.error){setToken(r.access_token);done(r.access_token);}else done(null);};
        pendingTokenResolveRef.current=finish;
        try{tc.requestAccessToken({prompt:'none'});}catch(e){pendingTokenResolveRef.current=null;finish({error:'err'});}
        setTimeout(()=>{if(!settled){pendingTokenResolveRef.current=null;finish({error:'timeout'});}},8000);
      });
    });
  }

  function driveSyncDebounced(){
    if(!driveTokenRef.current)return;
    clearTimeout(syncTimerRef.current);
    syncTimerRef.current=setTimeout(()=>driveSyncWith(),4000);
  }
  useEffect(()=>{if(wines.length>0)driveSyncDebounced();},[wines]);

  async function driveSyncWith(tok,isRetry){
    const t=tok||driveTokenRef.current;if(!t)return;
    setDriveStatus('syncing');
    const body=JSON.stringify({version:4,synced:new Date().toISOString(),wines:winesRef.current});
    try{
      let fid=driveFileId||localStorage.getItem('vino_gfid');
      let r;
      if(!fid){
        const meta=new Blob([JSON.stringify({name:'vinotheque-data.json',mimeType:'application/json'})],{type:'application/json'});
        const fd=new FormData();fd.append('metadata',meta);fd.append('file',new Blob([body],{type:'application/json'}));
        r=await fetch('https://www.googleapis.com/upload/drive/v3/files?uploadType=multipart',{method:'POST',headers:{Authorization:'Bearer '+t},body:fd});
      }else{
        r=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+fid+'?uploadType=media',{method:'PATCH',headers:{Authorization:'Bearer '+t,'Content-Type':'application/json'},body});
      }
      if(r.status===401){
        if(!isRetry){const nt=await refreshToken();if(nt)return driveSyncWith(nt,true);}
        setToken(null);setDriveStatus('expired');
        setDriveErr('Drive session expired. Tap Reconnect to resume syncing.');
        showToast('Drive session expired — tap Reconnect');
        return;
      }
      const d=await r.json().catch(()=>({}));
      if(r.status===403){
        const m=d.error?.message||'Access forbidden';
        let hint;
        if(/has not been used|is disabled|SERVICE_DISABLED|accessNotConfigured/i.test(m))
          hint='The Google Drive API is not enabled on this project. In Google Cloud Console → APIs & Services → Library, open "Google Drive API" and click Enable — and make sure it\u2019s the same project as your OAuth Client ID.';
        else if(/insufficient|scope|permission/i.test(m))
          hint='Drive permission wasn\u2019t granted at sign-in. Tap Disconnect, then Connect again, and tick the Drive access checkbox.';
        else hint='Drive refused the request: '+m;
        setDriveStatus('err');setDriveErr(hint);showToast('Drive error — open Backup to see why');
        console.error('[Drive 403]',m);
        return;
      }
      if(!r.ok||(!fid&&!d.id))throw new Error(d.error?.message||('HTTP '+r.status));
      if(!fid&&d.id){setDriveFileId(d.id);localStorage.setItem('vino_gfid',d.id);}
      const now=new Date();setLastSync(now);localStorage.setItem('vino_gsync',now.toISOString());
      setDriveStatus('ok');setDriveErr('');
    }catch(e){
      setDriveStatus('err');setDriveErr('Sync failed: '+e.message);
      showToast('Sync failed: '+e.message);console.error('[Drive sync]',e);
    }
  }

  async function driveAutoSync(tok,isRetry){
    const t=tok||driveTokenRef.current;if(!t)return;
    setDriveStatus('syncing');
    const auth={Authorization:'Bearer '+t};
    try{
      const q=encodeURIComponent("name='vinotheque-data.json' and trashed=false");
      const lr=await fetch('https://www.googleapis.com/drive/v3/files?q='+q+'&orderBy=modifiedTime%20desc&fields=files(id,modifiedTime)&spaces=drive',{headers:auth});
      if(lr.status===401){if(!isRetry){const nt=await refreshToken();if(nt)return driveAutoSync(nt,true);}setToken(null);setDriveStatus('expired');setDriveErr('Drive session expired. Tap Reconnect to resume syncing.');return;}
      if(lr.status===403){const ed=await lr.json().catch(()=>({}));const m=ed.error?.message||'forbidden';let hint;if(/has not been used|is disabled|SERVICE_DISABLED|accessNotConfigured/i.test(m))hint='The Google Drive API is not enabled on this project. In Google Cloud Console → APIs & Services → Library, enable "Google Drive API" for the same project as your Client ID.';else if(/insufficient|scope|permission/i.test(m))hint='Drive permission wasn\u2019t granted. Tap Disconnect, then Connect again and tick the Drive access box.';else hint='Drive refused: '+m;setDriveStatus('err');setDriveErr(hint);return;}
      const lj=await lr.json().catch(()=>({}));
      const files=lj.files||[];
      const local=winesRef.current||[];
      if(files.length===0){await driveSyncWith(t);return;}
      const canonical=files[0];
      setDriveFileId(canonical.id);localStorage.setItem('vino_gfid',canonical.id);
      const readWines=async(id)=>{try{const r=await fetch('https://www.googleapis.com/drive/v3/files/'+id+'?alt=media',{headers:auth});const d=await r.json().catch(()=>({}));const w=Array.isArray(d)?d:(d.wines||[]);return Array.isArray(w)?w:[];}catch(e){return [];}};
      if(files.length>1){
        // Duplicate files exist (one per device). Union everything so nothing is lost,
        // write to the newest, and trash the rest. Newest file wins per-id; local fills gaps.
        const ordered=files.slice().reverse();
        const map=new Map();
        for(const f of ordered){const ws=await readWines(f.id);ws.forEach(w=>{if(w&&w.id!=null)map.set(w.id,w);});}
        local.forEach(w=>{if(w&&w.id!=null&&!map.has(w.id))map.set(w.id,w);});
        const union=Array.from(map.values());
        const body=JSON.stringify({version:4,synced:new Date().toISOString(),wines:union});
        const pr=await fetch('https://www.googleapis.com/upload/drive/v3/files/'+canonical.id+'?uploadType=media',{method:'PATCH',headers:{...auth,'Content-Type':'application/json'},body});
        if(!pr.ok)throw new Error('write failed (HTTP '+pr.status+')');
        for(const f of files){if(f.id!==canonical.id){try{await fetch('https://www.googleapis.com/drive/v3/files/'+f.id,{method:'PATCH',headers:{...auth,'Content-Type':'application/json'},body:JSON.stringify({trashed:true})});}catch(e){}}}
        setWines(union);
        const now=new Date();setLastSync(now);localStorage.setItem('vino_gsync',now.toISOString());
        setDriveStatus('ok');setDriveErr('');
        showToast('Merged '+files.length+' Drive files → '+union.length+' wines');
        return;
      }
      // Single shared file: reconcile by recency.
      const fileWines=await readWines(canonical.id);
      const same=JSON.stringify(fileWines)===JSON.stringify(local);
      if(same){const now=new Date();setLastSync(now);localStorage.setItem('vino_gsync',now.toISOString());setDriveStatus('ok');setDriveErr('');return;}
      const fileTime=Date.parse(canonical.modifiedTime)||0;
      const localTime=Date.parse(localStorage.getItem('vino_gsync')||'')||0;
      if(fileWines.length>0&&(localTime===0||fileTime>localTime+2000)){
        setWines(fileWines);
        const now=new Date();setLastSync(now);localStorage.setItem('vino_gsync',now.toISOString());
        setDriveStatus('ok');setDriveErr('');
        showToast('Updated from Drive → '+fileWines.length+' wines');
      }else{
        await driveSyncWith(t);
      }
    }catch(e){setDriveStatus('err');setDriveErr('Sync failed: '+e.message);console.error('[Drive autosync]',e);}
  }

  async function driveLoad(){
    const fid=driveFileId||localStorage.getItem('vino_gfid');
    if(!driveTokenRef.current||!fid){showToast('Connect and sync first');return;}
    try{
      const r=await fetch('https://www.googleapis.com/drive/v3/files/'+fid+'?alt=media',{headers:{Authorization:'Bearer '+driveTokenRef.current}});
      if(r.status===401){setToken(null);setDriveStatus('expired');showToast('Drive session expired — tap Reconnect');return;}
      if(r.status===403){const ed=await r.json().catch(()=>({}));showToast('Drive refused: '+(ed.error?.message||'403'));return;}
      if(r.status===404){setDriveFileId(null);localStorage.removeItem('vino_gfid');showToast('Drive file not found — tap Sync Now to recreate it');return;}
      const d=await r.json();const inc=d.wines||d;
      if(!Array.isArray(inc))throw new Error('unexpected file format');
      if(!window.confirm('Replace the '+wines.length+' wine'+(wines.length!==1?'s':'')+' on this device with '+inc.length+' from Drive? Your current copy on this device will be overwritten.'))return;
      setWines(inc);showToast('Loaded '+inc.length+' wines from Drive');
    }catch(e){showToast('Load failed: '+e.message);}
  }

  function driveDisconnect(){
    clearTimeout(syncTimerRef.current);
    tokenClientRef.current=null;
    setToken(null);setDriveFileId(null);setDriveStatus('');setDriveErr('');setLastSync(null);
    ['vino_gtok','vino_gfid','vino_gsync'].forEach(k=>localStorage.removeItem(k));
    showToast('Disconnected');
  }

  // ── ICONS ──
  const IC={
    collection:<svg viewBox="0 0 24 24"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>,
    add:<svg viewBox="0 0 24 24"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    import:<svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>,
    backup:<svg viewBox="0 0 24 24"><polyline points="20 7 12 3 4 7"/><path d="M4 7v10l8 4 8-4V7"/><line x1="12" y1="3" x2="12" y2="22"/></svg>,
    chat:<svg viewBox="0 0 24 24"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>,
  };

  // ── RENDER ──
  return <>
    {/* BG */}
    <div style={{position:'fixed',inset:0,zIndex:0,pointerEvents:'none',background:'radial-gradient(ellipse 65% 45% at 10% 0%,rgba(92,21,39,.45),transparent 60%),radial-gradient(ellipse 45% 60% at 90% 100%,rgba(122,30,51,.2),transparent 55%)'}}/>

    <DragBar/>
    {/* TOP BAR */}
    <div className="topbar">
      <div style={{display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div className="brand">Vino<em>thèque</em><small>Wine Journal</small></div>
        <button className={'drive-pill '+(driveStatus==='ok'?'ok':(driveStatus==='err'||driveStatus==='expired')?'err':'')}
          onClick={()=>setView('backup')}
          style={{border:'none'}}>
          <span style={{width:6,height:6,borderRadius:'50%',background:'currentColor',display:'block',flexShrink:0}}/>
          {driveStatus==='ok'?'Synced':driveStatus==='syncing'?'Syncing…':driveStatus==='connecting'?'Connecting…':driveStatus==='expired'?'Reconnect':driveStatus==='err'?'Sync error':'Drive'}
        </button>
      </div>
    </div>

    {/* COLLECTION VIEW */}
    {view==='collection'&&<div className="page">
      <div className="searchbar">
        <div className="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search wines, tasting notes…"/>
        </div>
        <select value={searchIn} onChange={e=>setSearchIn(e.target.value)}
          style={{width:'auto',fontFamily:'sans-serif',fontSize:15,letterSpacing:'.1em',padding:'10px 8px'}}>
          {SEARCH_IN_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
      </div>
      <div className="pills">
        <button className={'pill'+(typeFilter==='all'?' active':'')} onClick={()=>setTypeFilter('all')}>All</button>
        {WINE_TYPES.map(t=><button key={t} className={'pill'+(typeFilter===t?' active':'')} onClick={()=>setTypeFilter(t)}>{TYPE_LABELS[t]}</button>)}
      </div>
      <div className="sortbar">
        <select value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{fontFamily:'sans-serif',fontSize:15,letterSpacing:'.1em',width:'auto'}}>
          {SORT_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
        <span style={{fontFamily:'sans-serif',fontSize:14,color:'#7a6555',letterSpacing:'.1em',flexShrink:0}}>then</span>
        <select value={sortBy2} onChange={e=>setSortBy2(e.target.value)} style={{fontFamily:'sans-serif',fontSize:15,letterSpacing:'.1em',width:'auto'}}>
          {SORT_OPTS.map(o=><option key={o.v} value={o.v}>{o.l}</option>)}
        </select>
        <select value={fCountry} onChange={e=>setFCountry(e.target.value)} style={{width:'auto',fontFamily:'sans-serif',fontSize:15,letterSpacing:'.1em'}}>
          <option value="">All Countries</option>{countries.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <select value={fGrape} onChange={e=>setFGrape(e.target.value)} style={{width:'auto',fontFamily:'sans-serif',fontSize:15,letterSpacing:'.1em'}}>
          <option value="">All Grapes</option>{grapes.map(g=><option key={g} value={g}>{g}</option>)}
        </select>
        <select value={fRetail} onChange={e=>setFRetail(e.target.value)} style={{width:'auto',fontFamily:'sans-serif',fontSize:15,letterSpacing:'.1em'}}>
          <option value="">All Retailers</option>{retailers.map(r=><option key={r} value={r}>{r}</option>)}
        </select>
        <select value={fScore} onChange={e=>setFScore(e.target.value)} style={{width:'auto',fontFamily:'sans-serif',fontSize:15,letterSpacing:'.1em'}}>
          <option value="">Any Score</option>{[3,4,5,6,7,8].map(n=><option key={n} value={n}>{'≥'} {n}</option>)}
        </select>
        <button onClick={resetFilters} style={{width:'auto',flexShrink:0,fontFamily:'sans-serif',fontSize:15,letterSpacing:'.1em',background:'none',border:'1px solid var(--bdr)',color:'#c9a050',borderRadius:4,padding:'8px 14px',cursor:'pointer'}}>Reset</button>
      </div>
      <div className="statbar">
        {[['Total',wines.length],['White',wines.filter(w=>w.type==='white').length],['Red',wines.filter(w=>w.type==='red').length],['Avg',avg],['Found',filtered.length]].map(([l,n])=>(
          <div key={l} className="stat"><div className="stat-n">{n}</div><div className="stat-l">{l}</div></div>
        ))}
      </div>
      {filtered.length===0
        ?<div className="empty"><div className="empty-icon" style={{fontSize:54,opacity:.3,marginBottom:10}}>{'\uD83C\uDF77'}</div><h3>{wines.length?'No matches':'Cellar is empty'}</h3><p>{wines.length?'Try different search or filters':'Add wines or import from Google Keep'}</p></div>
        :filtered.map(w=><WineCard key={w.id} w={w} onClick={()=>setDetail(w)}/>)
      }
      <div style={{height:20}}/>
    </div>}

    {/* IMPORT VIEW */}
    {view==='import'&&<div className="page">
      <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:300,marginBottom:4}}>Import <em style={{color:'#c9a050',fontStyle:'italic'}}>Notes</em></h1>
      <p style={{color:'#7a6555',fontStyle:'italic',fontSize:21,marginBottom:16}}>Paste Google Keep notes — entries separated by =====</p>
      <div className="fgrp"><label className="lbl">Paste notes</label>
        <textarea style={{minHeight:220,fontFamily:'monospace',fontSize:18,lineHeight:1.6}}
          value={importText} onChange={e=>{setImportText(e.target.value);setParsed(false);setPreview([]);}}
          placeholder={'Barolo Riserva, Piedmont, Italy, 2018, 14% (Majestic, \xa328.00)\n9\nC: deep garnet\n1\nN: tar, roses, cherries, tobacco\n3\n====='}/>
      </div>
      <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:10,marginBottom:12,padding:12,background:'rgba(255,255,255,.025)',border:'1px solid rgba(201,160,80,.17)',borderRadius:6}}>
        <div style={{gridColumn:'1/-1',fontFamily:'sans-serif',fontSize:12,letterSpacing:'.22em',textTransform:'uppercase',color:'#7a6555',marginBottom:4}}>Apply to all imported entries (optional)</div>
        <div className="fgrp"><label className="lbl">Date &amp; Time Tasted</label><input type="datetime-local" value={impDate} onChange={e=>setImpDate(e.target.value)}/></div>
        <div className="fgrp"><label className="lbl">Location</label><input value={impLoc} onChange={e=>setImpLoc(e.target.value)} placeholder="e.g. Home"/></div>
      </div>
      <div style={{display:'flex',gap:8,marginBottom:16}}>
        <button className="btn btn-p" onClick={doParse}>↳ Parse</button>
        <button className="btn btn-o" onClick={()=>{setImportText('');setPreview([]);setParsed(false);}}>Clear</button>
      </div>
      {parsed&&<>
        <div style={{fontFamily:'sans-serif',fontSize:14,letterSpacing:'.2em',textTransform:'uppercase',color:'#7a6555',marginBottom:8}}>
          Found <span style={{color:'#c9a050',fontFamily:"'Cormorant Garamond',serif",fontSize:27}}>{preview.length}</span> wines
        </div>
        {preview.map((w,i)=><div key={i} style={{background:'rgba(255,255,255,.032)',border:'1px solid rgba(201,160,80,.17)',padding:'8px 12px',borderRadius:4,marginBottom:5}}>
          <div style={{fontFamily:"'Cormorant Garamond',serif",fontSize:21,fontWeight:400,marginBottom:1}}>
            {w.wineName}{w.score!=null&&<span style={{color:'#c9a050',marginLeft:6}}>{w.score.toFixed(1)}</span>}
          </div>
          <div style={{fontSize:16,color:'#7a6555',fontStyle:'italic'}}>{[w.grape,[w.region,w.country].filter(Boolean).join(', '),w.vintage].filter(Boolean).join(' · ')}</div>
        </div>)}
        {preview.length>0&&<div style={{marginTop:10}}>
          <button className="btn btn-g btn-block" onClick={doImport}>Import All {preview.length} Wines</button>
          {preview.filter(p=>wines.some(e=>e.raw===p.raw)).length>0&&
            <p style={{color:'#7a6555',fontSize:20,fontStyle:'italic',marginTop:6,textAlign:'center'}}>
              ({preview.filter(p=>wines.some(e=>e.raw===p.raw)).length} exact duplicates will be skipped)
            </p>}
        </div>}
      </>}
      <div style={{height:20}}/>
    </div>}

    {/* BACKUP VIEW */}
    {view==='backup'&&<div className="page">
      <h1 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:42,fontWeight:300,marginBottom:16}}>Backup &amp; <em style={{color:'#c9a050',fontStyle:'italic'}}>Sync</em></h1>
      {/* Local backup */}
      <div style={{background:'rgba(255,255,255,.032)',border:'1px solid rgba(201,160,80,.17)',borderRadius:6,padding:'18px 16px',marginBottom:14}}>
        <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:300,marginBottom:5}}>Local <em style={{color:'#c9a050',fontStyle:'italic'}}>Backup</em></h3>
        <p style={{color:'#7a6555',fontSize:21,fontStyle:'italic',lineHeight:1.6,marginBottom:12}}>{wines.length} wines in journal. Download a JSON backup or restore from a previous file.</p>
        <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
          <button className="btn btn-g" onClick={exportJSON}>↓ Download Backup</button>
          <label className="btn btn-o" style={{cursor:'pointer'}}>↑ Restore from File<input type="file" accept=".json" style={{display:'none'}} onChange={importJSON}/></label>
        </div>
      </div>
      {/* Google Drive */}
      <div style={{background:'rgba(255,255,255,.032)',border:'1px solid rgba(201,160,80,.17)',borderRadius:6,padding:'18px 16px',marginBottom:14}}>
        <h3 style={{fontFamily:"'Cormorant Garamond',serif",fontSize:30,fontWeight:300,marginBottom:5}}>Google <em style={{color:'#c9a050',fontStyle:'italic'}}>Drive</em></h3>
        <p style={{color:'#7a6555',fontSize:21,fontStyle:'italic',lineHeight:1.6,marginBottom:12}}>Auto-syncs to <code style={{fontFamily:'monospace',fontSize:18,background:'rgba(255,255,255,.07)',padding:'1px 5px',borderRadius:3,color:'#f0e4cc'}}>vinotheque-data.json</code> in your Drive on every change.</p>
        {driveToken?<>
          <div style={{padding:'9px 13px',borderRadius:4,border:driveStatus==='err'?'1px solid rgba(255,80,80,.35)':'1px solid rgba(76,175,80,.35)',fontFamily:'sans-serif',fontSize:14,letterSpacing:'.14em',textTransform:'uppercase',color:driveStatus==='err'?'#ff8080':'#4caf50',background:driveStatus==='err'?'rgba(255,80,80,.07)':'rgba(76,175,80,.12)',marginBottom:10}}>
            {driveStatus==='syncing'?'Syncing…':driveStatus==='err'?'✗ Sync error':'✓ Connected — auto-syncing'}
          </div>
          {driveStatus==='err'&&driveErr&&<p style={{color:'#ff9a9a',fontSize:18,fontFamily:'sans-serif',lineHeight:1.5,marginBottom:10}}>{driveErr}</p>}
          {lastSync&&<p style={{color:'#7a6555',fontSize:18,fontFamily:'sans-serif',marginBottom:10}}>Last synced: {lastSync.toLocaleString('en-GB',{day:'numeric',month:'short',hour:'2-digit',minute:'2-digit'})}</p>}
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-grn" onClick={()=>driveSyncWith()}>↑ Sync Now</button>
            <button className="btn btn-o" onClick={driveLoad}>↓ Load from Drive</button>
            <button className="btn btn-d" onClick={driveDisconnect}>Disconnect</button>
          </div>
        </>:driveStatus==='expired'?<>
          <div style={{padding:'9px 13px',borderRadius:4,border:'1px solid rgba(255,80,80,.35)',fontFamily:'sans-serif',fontSize:14,letterSpacing:'.14em',textTransform:'uppercase',color:'#ff8080',background:'rgba(255,80,80,.07)',marginBottom:10}}>✗ Session expired</div>
          <p style={{color:'#f0e4cc',fontSize:20,lineHeight:1.55,marginBottom:12}}>{driveErr||'Your Drive session has expired — Google tokens last about an hour. Reconnect to resume auto-syncing (usually a single tap).'}</p>
          <div style={{display:'flex',gap:8,flexWrap:'wrap'}}>
            <button className="btn btn-grn" onClick={initDrive}>Reconnect</button>
            <button className="btn btn-d" onClick={driveDisconnect}>Disconnect</button>
          </div>
        </>:<>
          {driveClientId?
            <p style={{color:'#f0e4cc',fontSize:20,lineHeight:1.55,marginBottom:12}}>Set up — tap Connect to resume auto-syncing to <code style={{fontFamily:'monospace',fontSize:18,background:'rgba(255,255,255,.07)',padding:'1px 5px',borderRadius:3}}>vinotheque-data.json</code>.</p>
            :[['1','In console.cloud.google.com, create a project, then under APIs & Services → Library enable the Google Drive API.'],
              ['2','Under APIs & Services → OAuth consent screen, choose External, fill the required fields, and add your own Google account under "Test users". Sign-in is blocked without this.'],
              ['3','Under APIs & Services → Credentials, create an OAuth client ID of type "Web application". In "Authorised JavaScript origins" add this page\u2019s exact origin (shown below) — scheme + host only, no path or trailing slash. No redirect URI is needed.'],
              ['4','Serve over HTTPS — GitHub Pages is ideal. It will not work from a file:// page.'],
              ['5','Paste the Client ID below and tap Connect.']
            ].map(([n,t])=><div key={n} style={{display:'flex',gap:10,fontSize:20,lineHeight:1.55,marginBottom:10}}>
              <span style={{fontFamily:"'Cormorant Garamond',serif",fontSize:27,color:'#c9a050',flexShrink:0}}>{n}</span>
              <span style={{color:'#f0e4cc'}}>{t}</span>
            </div>)}
          {!driveClientId&&<div style={{fontSize:18,fontFamily:'sans-serif',color:'#7a6555',marginBottom:12,lineHeight:1.5}}>
            {location.protocol==='file:'
              ? <span style={{color:'#ff9a9a'}}>⚠ This page is open as a local file (file://). Google sign-in cannot run here — host it on GitHub Pages or a local server first.</span>
              : <>This page&rsquo;s origin (paste into Authorised JavaScript origins): <code style={{fontFamily:'monospace',fontSize:18,background:'rgba(255,255,255,.07)',padding:'1px 6px',borderRadius:3,color:'#f0e4cc'}}>{location.origin}</code></>}
          </div>}
          {driveErr&&<p style={{color:'#ff9a9a',fontSize:18,fontFamily:'sans-serif',lineHeight:1.5,marginBottom:10}}>{driveErr}</p>}
          <div className="fgrp"><label className="lbl">Google OAuth Client ID</label>
            <div style={{display:'flex',gap:8}}>
              <input value={driveClientId} onChange={e=>{tokenClientRef.current=null;setDriveClientId(e.target.value);}} placeholder="xxxx.apps.googleusercontent.com" style={{flex:1}}/>
              <button className="btn btn-grn" style={{flexShrink:0}} onClick={initDrive}>{driveStatus==='connecting'?'…':'Connect'}</button>
            </div>
          </div>
        </>}
      </div>
      <div style={{textAlign:'center',color:'#5a4a3f',fontSize:15,fontFamily:'sans-serif',letterSpacing:'.08em',marginTop:26}}>Vinothèque · {APP_BUILD}</div>
      <div style={{height:20}}/>
    </div>}

    {view==='guide'&&<TastingGuide onStartTasting={startTastingFrom}/>}

    {/* BOTTOM NAV */}
    <div className="bnav">
      {[{v:'collection',l:'Cellar'},{v:'import',l:'Import'},{v:'tidy',l:'Tidy'},{v:'guide',l:'Guide'},{v:'backup',l:'Backup'}].map(({v,l})=>(
        <button key={v} className={'bni'+(view===v?' active':'')} onClick={()=>setView(v)}>
          <svg viewBox="0 0 24 24">
            {v==='collection'&&<><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></>}
            {v==='import'&&<><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></>}
            {v==='tidy'&&<><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4.5" cy="6" r="1.2"/><circle cx="4.5" cy="12" r="1.2"/><circle cx="4.5" cy="18" r="1.2"/></>}
            {v==='backup'&&<><polyline points="20 7 12 3 4 7"/><path d="M4 7v10l8 4 8-4V7"/></>}
            {v==='guide'&&<><path d="M7 3h10l-1.3 6a4 4 0 01-7.4 0z"/><line x1="12" y1="13" x2="12" y2="20"/><line x1="8.5" y1="20" x2="15.5" y2="20"/></>}
          </svg>
          {l}
        </button>
      ))}
    </div>

    {/* FAB - Add Wine */}
    <button onClick={()=>{setPrefill(null);setAddingNew(true);}} style={{position:'fixed',bottom:'calc(72px + var(--safe-bottom))',right:18,zIndex:60,width:52,height:52,borderRadius:'50%',background:'#5c1527',border:'2px solid #7a1e33',color:'#f0e4cc',fontSize:39,display:'flex',alignItems:'center',justifyContent:'center',cursor:'pointer',boxShadow:'0 4px 20px rgba(122,30,51,.6)',lineHeight:1}}>+</button>

    {/* MODALS */}
    {addingNew&&<TastingForm initial={prefill||undefined} allWines={wines} onSave={addWine} onCancel={()=>{setAddingNew(false);setPrefill(null);}}/>}
    {view==='tidy'&&<ListManager wines={wines} setWines={setWines} fld={tidyFld} setFld={setTidyFld} scrollRef={tidyScrollRef} onSearch={tidySearch}/>}
    {detail&&!editing&&<DetailModal w={detail} onClose={()=>setDetail(null)} onEdit={()=>setEditing(detail)} onDelete={()=>deleteWine(detail.id)}/>}
    {editing&&<TastingForm initial={{...editing,tastedAt:editing.tastedAt?new Date(editing.tastedAt).toISOString().slice(0,16):''}} title={<>Edit <em>Wine</em></>} allWines={wines} onSave={saveEdit} onCancel={()=>setEditing(null)}/>}

    {/* TOAST */}
    {toast&&<div className="toast">{toast}</div>}
  </>;
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
window.__vinoMounted=1;
</script></body></html>
